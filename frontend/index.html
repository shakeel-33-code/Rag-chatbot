<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Assistant</title>
    <style>
        :root {
            --bg-color: #0f1117;
            --surface-color-1: #1a202c;
            --surface-color-2: #2d3748;
            --text-color: #e2e8f0;
            --accent-color: #3182ce;
            --accent-hover: #2b6cb0;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER BAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background-color: var(--surface-color-1);
            border-bottom: 1px solid var(--surface-color-2);
        }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .settings-btn:hover {
            background-color: var(--surface-color-2);
        }

        /* UPLOAD BAR */
        .upload-bar {
            padding: 1rem 1.5rem;
            background-color: var(--surface-color-1);
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid var(--surface-color-2);
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #upload-status {
            font-size: 0.875rem;
            color: #a0aec0;
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--accent-color);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--surface-color-2);
            border-bottom-left-radius: 4px;
        }

        .thinking {
            align-self: flex-start;
            background-color: transparent;
            color: #a0aec0;
            font-style: italic;
            display: none;
        }

        /* INPUT ROW */
        .input-row {
            padding: 1rem 1.5rem;
            background-color: var(--surface-color-1);
            display: flex;
            gap: 0.75rem;
        }

        .input-row input[type="text"] {
            flex: 1;
            background-color: var(--surface-color-2);
            border: 1px solid transparent;
            border-radius: 20px;
            padding: 0.75rem 1.25rem;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        /* SETTINGS OVERLAY */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background-color: var(--surface-color-1);
            padding: 1rem;
            border-radius: 12px;
            width: 96vw;
            height: 92vh;
            max-width: none;
            max-height: none;
            border: 1px solid var(--surface-color-2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal h2 {
            margin-top: 0;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 1rem;
            min-height: 0;
            flex: 1;
        }

        .settings-column,
        .observability-column {
            min-height: 0;
        }

        .settings-column {
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .observability-column {
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--surface-color-2);
            padding-left: 1rem;
        }

        .observability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .observability-header h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }

        .observability-actions {
            display: flex;
            gap: 0.5rem;
        }

        .observability-frame-wrap {
            flex: 1;
            min-height: 0;
            background-color: #0b0d12;
            border: 1px solid var(--surface-color-2);
            border-radius: 8px;
            overflow: hidden;
        }

        .observability-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background-color: #0b0d12;
        }

        .modal textarea {
            width: 100%;
            height: 150px;
            background-color: var(--surface-color-2);
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--text-color);
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        .modal textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .setting-row {
            margin-bottom: 1rem;
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: #a0aec0;
            margin-bottom: 0.4rem;
        }

        .setting-row input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .setting-row input[type="number"] {
            width: 80px;
            background-color: var(--surface-color-2);
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
            color: var(--text-color);
            text-align: center;
        }

        .setting-row input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--surface-color-2);
            color: var(--text-color);
        }
        
        .btn-outline:hover {
            background-color: var(--surface-color-2);
        }

        .btn-small {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
        }

        @media (max-width: 900px) {
            .modal {
                width: 96vw;
                height: 94vh;
            }

            .settings-grid {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }

            .observability-column {
                border-left: none;
                border-top: 1px solid var(--surface-color-2);
                padding-left: 0;
                padding-top: 1rem;
            }

            .observability-frame-wrap {
                min-height: 60vh;
            }
        }
        
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>RAG Assistant</h1>
        <button class="settings-btn" id="settings-open" title="Settings">⚙</button>
    </header>

    <!-- UPLOAD BAR -->
    <div class="upload-bar">
        <input type="file" id="pdf-upload" accept=".pdf" style="display: none;">
        <button class="btn" id="upload-btn">Upload PDF</button>
        <span id="upload-status">No file uploaded yet</span>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chat-area">
        <!-- Messages go here -->
        <div class="thinking" id="thinking-indicator">Thinking...</div>
    </div>

    <!-- INPUT ROW -->
    <div class="input-row">
        <input type="text" id="question-input" placeholder="Ask a question about the document..." autocomplete="off">
        <button class="btn" id="send-btn">Send</button>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="overlay" id="settings-overlay">
        <div class="modal">
            <h2>Settings</h2>

            <div class="settings-grid">
                <div class="settings-column">
                    <div class="setting-row">
                        <label class="setting-label">System Prompt</label>
                        <textarea id="prompt-textarea"></textarea>
                    </div>

                    <div class="setting-row">
                        <label class="setting-label">
                            Temperature
                            <span id="temp-display">0.20</span>
                        </label>
                        <input type="range" id="temperature-input" min="0" max="2" step="0.05" value="0.2">
                    </div>

                    <div class="setting-row">
                        <label class="setting-label">Max New Tokens</label>
                        <input type="number" id="max-tokens-input" min="64" max="2048" step="64" value="512">
                    </div>

                    <div class="setting-row">
                        <label class="setting-label">
                            Top K Chunks
                            <small style="color:#718096;font-size:0.75rem">context chunks retrieved</small>
                        </label>
                        <input type="number" id="top-k-input" min="1" max="10" step="1" value="3">
                    </div>
                </div>

                <div class="observability-column">
                    <div class="observability-header">
                        <h3>View Traces And Observability</h3>
                        <div class="observability-actions">
                            <button class="btn btn-outline btn-small" id="traces-refresh" type="button">Refresh</button>
                            <a class="btn btn-small" id="traces-open" href="http://127.0.0.1:6006/projects/" target="_blank" rel="noopener">Open</a>
                        </div>
                    </div>
                    <div class="observability-frame-wrap">
                        <iframe
                            class="observability-frame"
                            id="phoenix-frame"
                            title="Phoenix traces and observability"
                            src="http://127.0.0.1:6006/projects/"
                        ></iframe>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-outline" id="settings-cancel">Cancel</button>
                <button class="btn" id="settings-save">Save</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let chatHistory = [];

        // DOM Elements
        const chatArea = document.getElementById('chat-area');
        const questionInput = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');
        const thinkingIndicator = document.getElementById('thinking-indicator');
        
        const uploadBtn = document.getElementById('upload-btn');
        const pdfUpload = document.getElementById('pdf-upload');
        const uploadStatus = document.getElementById('upload-status');
        
        const settingsOpen = document.getElementById('settings-open');
        const settingsOverlay = document.getElementById('settings-overlay');
        const settingsCancel = document.getElementById('settings-cancel');
        const settingsSave = document.getElementById('settings-save');
        const promptTextarea = document.getElementById('prompt-textarea');
        const phoenixFrame = document.getElementById('phoenix-frame');
        const tracesRefresh = document.getElementById('traces-refresh');

        // Helper: Append message to chat
        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            chatArea.insertBefore(div, thinkingIndicator);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Send Question
        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            // Update UI
            questionInput.value = '';
            appendMessage('user', question);
            
            // Push to history
            const userMsg = { role: 'user', content: question };
            
            sendBtn.disabled = true;
            questionInput.disabled = true;
            thinkingIndicator.style.display = 'block';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        history: chatHistory
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Failed to get answer');
                }

                const data = await response.json();
                
                // Add back user message to history
                chatHistory.push(userMsg);
                
                // Add assistant response to history
                const assistantMsg = { role: 'assistant', content: data.answer };
                chatHistory.push(assistantMsg);
                
                appendMessage('assistant', data.answer);
            } catch (error) {
                appendMessage('assistant', `Error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                questionInput.disabled = false;
                thinkingIndicator.style.display = 'none';
                questionInput.focus();
            }
        }

        // Upload PDF
        uploadBtn.addEventListener('click', () => {
            pdfUpload.click();
        });

        pdfUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            uploadStatus.textContent = 'Uploading...';
            uploadBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Upload failed');
                }

                const data = await response.json();
                uploadStatus.textContent = data.message;
            } catch (error) {
                uploadStatus.textContent = `Upload failed: ${error.message}`;
            } finally {
                uploadBtn.disabled = false;
                pdfUpload.value = ''; // Reset input
            }
        });

        // Event Listeners
        sendBtn.addEventListener('click', sendQuestion);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuestion();
        });

        // Settings Modal
        const temperatureInput = document.getElementById('temperature-input');
        const tempDisplay = document.getElementById('temp-display');
        const maxTokensInput = document.getElementById('max-tokens-input');
        const topKInput = document.getElementById('top-k-input');

        temperatureInput.addEventListener('input', () => {
            tempDisplay.textContent = parseFloat(temperatureInput.value).toFixed(2);
        });

        settingsOpen.addEventListener('click', async () => {
            try {
                const res = await fetch(`${API_BASE}/settings`);
                if (res.ok) {
                    const data = await res.json();
                    promptTextarea.value = data.system_prompt;
                    temperatureInput.value = data.temperature;
                    tempDisplay.textContent = parseFloat(data.temperature).toFixed(2);
                    maxTokensInput.value = data.max_new_tokens;
                    topKInput.value = data.top_k;
                }
            } catch (e) {
                console.error("Could not fetch settings", e);
            }
            phoenixFrame.src = 'http://127.0.0.1:6006/projects/';
            settingsOverlay.style.display = 'flex';
        });

        settingsCancel.addEventListener('click', () => {
            settingsOverlay.style.display = 'none';
        });

        settingsSave.addEventListener('click', async () => {
            settingsSave.disabled = true;
            try {
                await fetch(`${API_BASE}/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_prompt: promptTextarea.value,
                        temperature: parseFloat(temperatureInput.value),
                        max_new_tokens: parseInt(maxTokensInput.value),
                        top_k: parseInt(topKInput.value),
                    })
                });
            } catch (e) {
                console.error("Could not save settings", e);
            } finally {
                settingsSave.disabled = false;
                settingsOverlay.style.display = 'none';
            }
        });

        tracesRefresh.addEventListener('click', () => {
            phoenixFrame.src = 'http://127.0.0.1:6006/projects/';
        });
    </script>
</body>
</html>
